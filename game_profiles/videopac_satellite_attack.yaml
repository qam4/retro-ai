# Satellite Attack (Videopac)
# ROM paths use $RETRO_AI_ROM_DIR — set it or source setup_env.sh
name: satellite_attack
display_name: "Satellite Attack (Videopac)"
emulator_type: videopac
rom_path: "$RETRO_AI_ROM_DIR/videopac/Satellite Attack (1981)(Philips)(EU).bin"
bios_path: "$RETRO_AI_ROM_DIR/videopac/Philips C52 BIOS (19xx)(Philips)(FR).bin"
reward_mode: vision
reward_params:
  screen_region:
    x: 112
    y: 80
    width: 40
    height: 14
startup_sequence:
  actions:
    - action: 1
      frames: 10
  post_delay_frames: 120
grayscale: true
resize: [84, 84]
frame_stack: 4
frame_skip: 4
