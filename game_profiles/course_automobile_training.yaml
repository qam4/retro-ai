# Training config for Course Automobile - Game 1 Level 1
# Usage: retro-ai train game_profiles/course_automobile_training.yaml

algorithm:
  name: PPO
  learning_rate: 0.0003
  batch_size: 64

total_timesteps: 100000
game_profile: course_automobile
reward_mode: survival
policy: CnnPolicy

# Preprocessing
grayscale: true
resize: [84, 84]
frame_stack: 4
frame_skip: 4

# Output
output_dir: output/course_automobile
checkpoint_interval: 25000
max_checkpoints: 3
log_interval: 1000

# Metrics
rolling_window: 50
stagnation_threshold: 50000
tensorboard: false
