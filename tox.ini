[tox]
envlist = py313, lint
skip_missing_interpreters = true
# Don't try to build/install the project itself (native module is built by CMake)
no_package = true

[testenv]
# Reuse system packages (PyTorch, SB3, gymnasium already installed)
system_site_packages = true
deps =
    pytest>=7.0
allowlist_externals =
    pytest
setenv =
    PYTHONPATH = {toxinidir}/python:{env:RETRO_AI_BUILD_DIR:{toxinidir}/build/dev-win64/Debug}
commands =
    pytest tests/python/ -v --tb=short {posargs}

[testenv:lint]
deps =
    black>=24.0
    ruff>=0.4.0
allowlist_externals =
    black
    ruff
commands =
    black --check python/
    ruff check python/

[testenv:format]
deps =
    black>=24.0
allowlist_externals =
    black
commands =
    black python/
